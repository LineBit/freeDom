<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音爆款文案助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:36px 20px 28px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(255,107,53,.15),transparent 50%),radial-gradient(circle at 70% 50%,rgba(0,210,255,.12),transparent 50%);pointer-events:none}
.header h1{font-size:26px;font-weight:700;margin-bottom:6px;position:relative}
.header p{font-size:14px;opacity:.8;position:relative}
.badge{display:inline-block;background:rgba(255,107,53,.25);color:#ff6b35;font-size:11px;padding:2px 10px;border-radius:10px;margin-top:8px;font-weight:500}
.container{max-width:780px;margin:0 auto;padding:20px 16px 60px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.form-group{margin-bottom:16px}.form-group:last-child{margin-bottom:0}
.form-group label{display:block;font-size:13px;font-weight:500;color:#6b6b70;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;font-size:14px;border:1.5px solid #e5e5ea;border-radius:8px;outline:none;transition:border-color .2s;background:#fff;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#ff6b35;box-shadow:0 0 0 3px rgba(255,107,53,.12)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:0}
.type-btn{padding:10px 8px;border:1.5px solid #e5e5ea;border-radius:8px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;font-size:13px;line-height:1.3}
.type-btn:hover{border-color:#ff6b35;background:#fff8f5}
.type-btn.active{border-color:#ff6b35;background:#fff0e8;color:#e65c00;font-weight:600}
.type-btn .emoji{display:block;font-size:22px;margin-bottom:4px}
#formFields{transition:opacity .2s}.form-fields-loading{opacity:.4;pointer-events:none}
.btn-row{display:flex;gap:10px}
.btn{flex:1;padding:12px;font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all .2s;text-align:center}
.btn-primary{background:linear-gradient(135deg,#ff6b35,#e65c00);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,107,53,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:#f5f5f7;color:#1d1d1f;border:1.5px solid #e5e5ea}
.btn-secondary:hover{background:#e8e8ed}
.loading{display:none;text-align:center;padding:24px}.loading.active{display:block}
.spinner{width:32px;height:32px;border:3px solid #e5e5ea;border-top-color:#ff6b35;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:13px;color:#8e8e93}
.output-area{display:none}.output-area.active{display:block}
.output-content{font-size:14px;line-height:1.7;color:#1d1d1f;padding:16px;background:#fafafa;border-radius:8px;border:1px solid #e5e5ea;font-family:inherit}
.output-content .sec-title{color:#e65c00;font-weight:600;font-size:14px;margin-top:18px;margin-bottom:6px}
.output-content .sec-title:first-child{margin-top:0}
.output-content .sensitive{background:#fff0f0;color:#d32f2f;padding:0 4px;border-radius:3px;border-bottom:2px solid #ff5252}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.output-header h3{font-size:15px;font-weight:600}
.output-header .stats{font-size:12px;color:#8e8e93}
.copy-btn{background:transparent;border:1.5px solid #e5e5ea;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;color:#6b6b70;transition:all .2s}
.copy-btn:hover{background:#f5f5f7;color:#1d1d1f}
.copy-btn.copied{background:#34c759;color:#fff;border-color:#34c759}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.error{display:none;background:#fff2f0;border:1px solid #ffccc7;border-radius:8px;padding:12px 16px;font-size:13px;color:#cf1322;margin-top:12px}.error.active{display:block}
.feature-tip{font-size:12px;color:#8e8e93;margin-top:6px}
@media (max-width:480px){
.header{padding:24px 16px 20px}.header h1{font-size:20px}
.container{padding:12px 12px 40px}.card{padding:16px}
.form-row{grid-template-columns:1fr}.type-grid{grid-template-columns:repeat(2,1fr)}
.btn-row{flex-direction:column}
.output-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="header">
  <h1>🔥 抖音爆款文案助手</h1>
  <p>覆盖五大热门赛道，一键生成高转化抖音文案</p>
  <div class="badge">本地生活 · 好物带货 · 知识口播 · 个人IP · 情感段子</div>
</div>
<div class="container">
  <div class="card">
    <h2>📋 选择内容赛道</h2>
    <div class="type-grid" id="typeGrid">
      <div class="type-btn active" data-type="local" onclick="selectType(this,'local')">
        <span class="emoji">🏪</span>本地生活/探店
      </div>
      <div class="type-btn" data-type="shop" onclick="selectType(this,'shop')">
        <span class="emoji">🛍️</span>好物带货/分享
      </div>
      <div class="type-btn" data-type="edu" onclick="selectType(this,'edu')">
        <span class="emoji">🎓</span>知识口播
      </div>
      <div class="type-btn" data-type="ip" onclick="selectType(this,'ip')">
        <span class="emoji">👤</span>个人IP/人设
      </div>
      <div class="type-btn" data-type="emo" onclick="selectType(this,'emo')">
        <span class="emoji">💥</span>情感共鸣/段子
      </div>
    </div>
  </div>
  <div class="card">
    <h2 id="formTitle">✏️ 输入信息</h2>
    <div id="formFields"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="generateBtn" onclick="generate()">✨ 一键生成</button>
      <button class="btn btn-secondary" onclick="clearAll()">🔄 清空</button>
    </div>
    <div class="feature-tip">生成后自动检测违禁词，红色高亮标注</div>
  </div>
  <div class="card loading" id="loading">
    <div class="spinner"></div>
    <p>正在生成文案，约需 15-30 秒...</p>
  </div>
  <div class="card output-area" id="outputArea">
    <div class="output-header">
      <div>
        <h3>📄 生成结果</h3>
        <span class="stats" id="wordCount"></span>
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyOutput()">📋 复制全文</button>
    </div>
    <div class="output-content" id="outputContent"></div>
    <div style="margin-top:12px" id="sensitiveWarning"></div>
  </div>
  <div class="error" id="error"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var TYPCFG = {
  local: { name:'本地生活/探店', title:'✏️ 探店信息', fields:[
    { id:'a1',lb:'店铺名称 *',ph:'如：楠火锅、XX美甲店',val:'楠火锅'},
    { id:'a2',lb:'城市 / 具体位置 *',ph:'如：深圳南山区海岸城',val:'深圳'},
    { id:'a3',lb:'人均消费',ph:'如：80-120元',val:''},
    { id:'a4',lb:'特色 / 招牌',ph:'如：九宫格火锅、招牌毛肚',val:''},
    { id:'a5',lb:'适合什么场景',ph:'如：约会、聚餐、一个人吃',val:''},
    { id:'a6',lb:'文案风格', tp:'sel', val:'真实分享/种草', opts:['真实分享/种草','幽默吐槽','走心故事','避坑测评','探店攻略']},
    { id:'a7',lb:'其他要求', tp:'ta', ph:'如：强调环境好、适合拍照、服务贴心',val:''}
  ]},
  shop: { name:'好物带货/分享', title:'✏️ 产品信息', fields:[
    { id:'b1',lb:'产品名称 *',ph:'如：XX洗面奶、某品牌蓝牙耳机',val:'某某洗面奶'},
    { id:'b2',lb:'价格区间',ph:'如：99-199元',val:''},
    { id:'b3',lb:'适用人群 *',ph:'如：油皮女生、上班族',val:''},
    { id:'b4',lb:'核心卖点 *',ph:'如：温和不刺激、续航30天',val:''},
    { id:'b5',lb:'使用场景',ph:'如：早晚洗脸、通勤路上',val:''},
    { id:'b6',lb:'文案风格', tp:'sel', val:'真实分享/种草', opts:['真实分享/种草','干货测评','价格对比','幽默安利','痛点共鸣']},
    { id:'b7',lb:'其他要求', tp:'ta', ph:'如：强调性价比、加入个人对比',val:''}
  ]},
  edu: { name:'知识口播', title:'✏️ 知识点信息', fields:[
    { id:'c1',lb:'主题 / 知识点 *',ph:'如：怎么学好英语、理财入门',val:'怎么学好英语口语'},
    { id:'c2',lb:'目标受众 *',ph:'如：英语小白、职场新人',val:''},
    { id:'c3',lb:'核心观点 *',ph:'一句话总结你的观点',val:''},
    { id:'c4',lb:'可用案例/数据',ph:'如：研究数据、个人经历、名人案例',val:''},
    { id:'c5',lb:'要反驳的常见误区',ph:'如：很多人以为…其实…',val:''},
    { id:'c6',lb:'文案风格', tp:'sel', val:'干货实用/教学', opts:['干货实用/教学','反常识颠覆','争议讨论','轻松科普','深度分析']},
    { id:'c7',lb:'其他要求', tp:'ta', ph:'如：语气坚定、结尾引发讨论',val:''}
  ]},
  ip: { name:'个人IP/人设', title:'✏️ 个人品牌信息', fields:[
    { id:'d1',lb:'你的身份 / 行业 *',ph:'如：3年设计师、创业2年',val:'3年自媒体运营'},
    { id:'d2',lb:'核心故事 / 经历 *',ph:'如：从月薪3000到月入3万',val:''},
    { id:'d3',lb:'想传递的价值观 *',ph:'如：努力就有回报、选择比努力重要',val:''},
    { id:'d4',lb:'目标受众',ph:'如：想转行的人、刚毕业的大学生',val:''},
    { id:'d5',lb:'你的成就/亮点',ph:'如：帮助100人成功转行',val:''},
    { id:'d6',lb:'文案风格', tp:'sel', val:'走心感人/故事', opts:['走心感人/故事','真实记录','干货分享','观点输出','幽默自嘲']},
    { id:'d7',lb:'其他要求', tp:'ta', ph:'如：突出反差感、语气真诚',val:''}
  ]},
  emo: { name:'情感共鸣/段子', title:'✏️ 话题信息', fields:[
    { id:'e1',lb:'话题 / 场景 *',ph:'如：成年人的孤独、加班的日常',val:'成年人的孤独瞬间'},
    { id:'e2',lb:'目标人群 *',ph:'如：在外打拼的年轻人、宝妈',val:''},
    { id:'e3',lb:'情绪调性', tp:'sel', val:'走心感人', opts:['走心感人','幽默搞笑','扎心现实','温暖治愈','吐槽解压']},
    { id:'e4',lb:'具体故事（可选）', tp:'ta', ph:'如：一个人搬家、深夜加班回家',val:''},
    { id:'e5',lb:'其他要求', tp:'ta', ph:'如：引起评论区共鸣、节奏要快',val:''}
  ]}
};
var curType = 'local';
var SYS = { local:'你是一个抖音本地生活探店文案专家。输出格式：\n---\n📌 标题选项（3个）\n📝 正文（6段：黄金3秒→背景→环境→产品→价格→互动）\n🎬 拍摄建议（5条）\n🏷️ 推荐标签（15个）\n⚠️ 文案合规提醒\n---', shop:'你是一个抖音好物带货文案专家。输出格式：\n---\n📌 标题选项（3个）\n📝 正文（痛点→发现→体验→价格→适合谁→引导）\n📦 产品卖点\n🎬 拍摄建议（5条）\n🏷️ 推荐标签（15个）\n⚠️ 文案合规提醒\n---', edu:'你是一个抖音知识口播文案专家。输出格式：\n---\n📌 标题选项（3个）\n📝 口播脚本（反常识→观点→3论点→案例→总结）\n🎬 拍摄建议（5条）\n🏷️ 推荐标签（15个）\n⚠️ 文案合规提醒\n---', ip:'你是一个抖音个人IP文案专家。输出格式：\n---\n📌 标题选项（3个）\n📝 人设文案（身份→故事→观点→案例→价值观）\n🎬 拍摄建议（5条）\n🏷️ 推荐标签（15个）\n⚠️ 文案合规提醒\n---', emo:'你是一个抖音情感/段子文案专家。输出格式：\n---\n📌 标题选项（3个）\n📝 正文（情绪→故事→反转→金句→互动）\n🎬 拍摄建议（5条）\n🏷️ 推荐标签（15个）\n⚠️ 文案合规提醒\n---' };
var SENS = ['最好','第一','唯一','首例','顶级','首创','极致','完美','彻底','绝对','保证','100%','一次见效','立竿见影','永不复发','安全','国家级','最高级','最佳','全网最低','史上最低','永久','免费送'];
var DAILY_LIMIT=5;var WATERMARK='---\n🤖 由「抖音爆款文案助手」生成 · 微信: Zhanzhang091645';

function renderForm(){var c=TYPCFG[curType];document.getElementById('formTitle').textContent=c.title;var h='';c.fields.forEach(function(f){var id=f.id||'',lb=f.lb||'',ph=f.ph||'',val=f.val||'',tp=f.tp||'text';if(tp=='sel'){var opts=f.opts||[];h+='<div class="form-group"><label>'+lb+'</label><select id="'+id+'">';opts.forEach(function(o){h+='<option value="'+o+'"'+(o==val?' selected':'')+'>'+o+'</option>';});h+='</select></div>';}else if(tp=='ta'){h+='<div class="form-group"><label>'+lb+'</label><textarea id="'+id+'" placeholder="'+ph+'">'+val+'</textarea></div>';}else{h+='<div class="form-group"><label>'+lb+'</label><input type="text" id="'+id+'" placeholder="'+ph+'" value="'+val+'"></div>';}});document.getElementById('formFields').innerHTML=h;}
function selectType(el,t){curType=t;document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('active');});el.classList.add('active');renderForm();document.getElementById('outputArea').className='card output-area';document.getElementById('error').className='error';document.getElementById('sensitiveWarning').innerHTML='';document.getElementById('wordCount').textContent='';}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.className='toast show';setTimeout(function(){t.className='toast';},2000);}
function buildPrompt(){var c=TYPCFG[curType];var parts=['【内容类型】'+c.name];for(var i=0;i<c.fields.length;i++){var f=c.fields[i];var el=document.getElementById(f.id);if(!el)continue;var v=el.value.trim();if(f.lb.indexOf('*')>=0&&!v){showToast('请填写：'+f.lb.replace(' *',''));return null;}if(v)parts.push('【'+f.lb.replace(' *','')+'】'+v);}return parts.join('\n');}
function checkSen(t){var r=[];SENS.forEach(function(w){var re=new RegExp(w,'g');var m;while((m=re.exec(t))!==null)r.push({word:w,idx:m.index});});return r.sort(function(a,b){return a.idx-b.idx;});}
function highlight(t,ws){if(!ws.length)return t;var s='',last=0;ws.forEach(function(w){if(w.idx<last)return;var end=w.idx+w.word.length;s+=t.substring(last,w.idx)+'<span class="sensitive">'+t.substring(w.idx,end)+'</span>';last=end;});s+=t.substring(last);return s;}
async function generate(){var inp=buildPrompt();if(!inp)return;var key=document.getElementById('apiKey').value.trim();if(!key||!key.startsWith('sk-')){showToast('请填写有效的API Key');return;}
var uk='use_'+new Date().toISOString().slice(0,10);var uc=parseInt(localStorage.getItem(uk)||'0');if(uc>=DAILY_LIMIT){showToast('今日免费次数已用完（'+DAILY_LIMIT+'次），加微信 Zhanzhang091645 解锁无限使用');return;}
var btn=document.getElementById('generateBtn');var ld=document.getElementById('loading');var oa=document.getElementById('outputArea');var er=document.getElementById('error');
btn.disabled=true;btn.textContent='\u23f3 \u751f\u6210\u4e2d...';ld.className='card loading active';oa.className='card output-area';er.className='error';document.getElementById('sensitiveWarning').innerHTML='';
try{var r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:SYS[curType]},{role:'user',content:inp}],temperature:0.85,max_tokens:3072})});
if(!r.ok){var e=await r.text();throw new Error('API\u9519\u8bef('+r.status+'): '+e);}var d=await r.json();var c=d.choices[0].message.content;var cl=c.replace(/^### /gm,'').replace(/^## /gm,'');cl=cl+'\n\n'+WATERMARK;var fs=checkSen(cl);
var h='',ls=cl.split('\n');for(var i=0;i<ls.length;i++){var t=ls[i].trim();if(!t){h+='<br>';continue;}if(/^[\ud83d\udccc\ud83d\udcdd\ud83c\udfac\ud83c\udff7\ufe0f\u26a0\ufe0f\ud83d\udce6]/.test(t)){h+='<div class="sec-title">'+t+'</div>';}else if(/^\d+[\.\u3001]/.test(t)){h+='<div style="margin-left:12px;margin-bottom:3px">'+t+'</div>';}else if(/^#/.test(t)){h+='<div style="color:#e65c00;font-size:13px;margin-top:4px">'+t+'</div>';}else{var es=t.replace(/</g,'&lt;');h+='<div style="margin-bottom:3px">'+highlight(es,checkSen(t))+'</div>';}}
document.getElementById('outputContent').innerHTML=h;
var cc=cl.replace(/[\ud83d\udccc\ud83d\udcdd\ud83c\udfac\ud83c\udff7\ufe0f\u26a0\ufe0f\ud83d\udce6\s]/g,'').length;document.getElementById('wordCount').textContent='\u7ea6'+cc+'\u5b57 \u00b7 \u53e3\u64ad\u7ea6'+Math.round(cc/250*60)+'\u79d2';
if(fs.length){var u=[];fs.forEach(function(s){if(u.indexOf(s.word)<0)u.push(s.word);});document.getElementById('sensitiveWarning').innerHTML='<div style="background:#fff8f0;border:1px solid #ffcc02;border-radius:8px;padding:10px 14px;font-size:13px">\u26a0\ufe0f \u68c0\u6d4b\u5230 <strong>'+u.length+'</strong> \u4e2a\u7591\u4f3c\u8fdd\u7981\u8bcd\uff1a<span style="color:#d32f2f;font-weight:500">'+u.join('\u3001')+'</span><br><span style="color:#8e8e93;font-size:12px">\u5efa\u8bae\u66ff\u6362\u540c\u4e49\u8bcd</span></div>';}
